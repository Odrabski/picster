<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Picster</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }

    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 28px; }
    #login-screen h1 { font-size: 3rem; font-weight: 700; letter-spacing: -1px; }
    #login-screen p { color: #888; }
    .google-btn { display: inline-flex; align-items: center; gap: 12px; background: #fff; color: #3c4043; font-size: 0.95rem; font-weight: 600; padding: 12px 24px; border-radius: 8px; text-decoration: none; transition: box-shadow 0.2s; }
    .google-btn:hover { box-shadow: 0 4px 16px rgba(255,255,255,0.15); }
    .google-btn svg { width: 20px; height: 20px; }

    #topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    #topbar .logo { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; }
    #user-row { display: flex; align-items: center; gap: 10px; }
    #user-row img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
    #user-row span { font-size: 0.875rem; color: #aaa; }
    .btn-ghost { background: none; border: 1px solid rgba(255,255,255,0.25); color: #ccc; font-size: 0.8rem; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
    .btn-ghost:hover { border-color: #fff; color: #fff; }

    #home-screen { display: none; }
    #grid-header { display: flex; align-items: center; justify-content: space-between; padding: 24px 24px 12px; }
    #grid-header h2 { font-size: 1.1rem; font-weight: 600; color: #ccc; }
    .btn-add { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 0.875rem; font-weight: 600; padding: 8px 18px; border-radius: 50px; cursor: pointer; transition: background 0.2s; }
    .btn-add:hover { background: rgba(255,255,255,0.18); }

    #people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 12px 24px 32px; }
    .person-card { position: relative; aspect-ratio: 1; border-radius: 12px; overflow: hidden; cursor: pointer; background: #1a1a1a; transition: transform 0.15s; }
    .person-card:hover { transform: scale(1.03); }
    .person-card img { width: 100%; height: 100%; object-fit: cover; }
    .person-card .card-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 28px 10px 10px; background: linear-gradient(to top, rgba(0,0,0,0.75), transparent); font-size: 0.9rem; font-weight: 600; }
    .person-card .delete-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.55); border: none; color: #fff; width: 26px; height: 26px; border-radius: 50%; font-size: 0.75rem; cursor: pointer; display: none; align-items: center; justify-content: center; }
    .person-card:hover .delete-btn { display: flex; }
    .card-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }

    #empty-state { display: none; flex-direction: column; align-items: center; padding: 80px 24px; gap: 16px; color: #555; text-align: center; }
    #empty-state .icon { font-size: 3rem; }

    #add-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 65px); gap: 20px; padding: 24px; text-align: center; }
    #add-screen h2 { font-size: 1.4rem; font-weight: 700; }
    #add-screen p { color: #888; font-size: 0.9rem; max-width: 360px; line-height: 1.6; }
    .btn-primary { background: #fff; color: #000; font-size: 0.95rem; font-weight: 700; padding: 12px 32px; border-radius: 50px; border: none; cursor: pointer; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    #person-name-input { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 1rem; padding: 10px 16px; border-radius: 8px; width: 240px; text-align: center; }
    #person-name-input::placeholder { color: #555; }
    #person-name-input:focus { outline: none; border-color: rgba(255,255,255,0.5); }

    #photo-screen { display: none; flex-direction: column; height: calc(100vh - 65px); }
    #photo-topbar { display: flex; align-items: center; gap: 12px; padding: 14px 20px; }
    #back-btn { background: none; border: none; color: #aaa; font-size: 1.4rem; cursor: pointer; line-height: 1; }
    #back-btn:hover { color: #fff; }
    #photo-person-name { font-weight: 600; font-size: 1rem; }
    #photo-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    #photo { max-width: 100%; max-height: 100%; object-fit: contain; transition: opacity 0.3s; }
    #photo.hidden { opacity: 0; }
    #spinner { position: absolute; width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.15); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #photo-bottom { padding: 16px 24px 28px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    #photo-filename { font-size: 0.78rem; color: #555; }
    #next-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 0.95rem; font-weight: 600; padding: 11px 36px; border-radius: 50px; cursor: pointer; transition: background 0.2s; }
    #next-btn:hover { background: rgba(255,255,255,0.18); }
    #next-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #photo-error { color: #ff6b6b; font-size: 0.85rem; display: none; }
  </style>
</head>
<body>

<div id="login-screen">
  <h1>Picster</h1>
  <p>Random photos of the people you love</p>
  <a class="google-btn" href="/auth/google">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Sign in with Google
  </a>
</div>

<div id="app" style="display:none">
  <div id="topbar">
    <span class="logo">Picster</span>
    <div id="user-row">
      <img id="user-avatar" src="" alt="" />
      <span id="user-name"></span>
      <button class="btn-ghost" onclick="location.href='/auth/logout'">Logout</button>
    </div>
  </div>

  <!-- People grid -->
  <div id="home-screen">
    <div id="grid-header">
      <h2>People</h2>
      <button class="btn-add" onclick="showAddScreen()">+ Add Person</button>
    </div>
    <div id="empty-state">
      <div class="icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
      <p>Add people to see random photos of them</p>
      <button class="btn-add" style="margin-top:8px" onclick="showAddScreen()">+ Add Person</button>
    </div>
    <div id="people-grid"></div>
  </div>

  <!-- Add person -->
  <div id="add-screen">
    <div id="add-step-1" style="display:flex;flex-direction:column;align-items:center;gap:16px">
      <h2>Add a Person</h2>
      <p>Open Google Photos, go to <strong style="color:#fff">People & Pets</strong>, and select all photos of one person. Then come back here.</p>
      <button class="btn-primary" id="open-picker-btn" onclick="openPicker()">Open Google Photos</button>
      <button class="btn-ghost" onclick="showHome()">Cancel</button>
    </div>
    <div id="add-step-2" style="display:none;flex-direction:column;align-items:center;gap:16px">
      <h2>Who is this?</h2>
      <p>Give this person a name.</p>
      <input id="person-name-input" type="text" placeholder="e.g. Mom, David..." maxlength="30"
        onkeydown="if(event.key==='Enter') savePerson()" />
      <button class="btn-primary" onclick="savePerson()">Save</button>
      <button class="btn-ghost" onclick="showHome()">Cancel</button>
    </div>
  </div>

  <!-- Photo viewer -->
  <div id="photo-screen">
    <div id="photo-topbar">
      <button id="back-btn" onclick="showHome()">←</button>
      <span id="photo-person-name"></span>
    </div>
    <div id="photo-wrap">
      <div id="spinner"></div>
      <img id="photo" class="hidden" alt="" />
    </div>
    <div id="photo-bottom">
      <span id="photo-filename"></span>
      <button id="next-btn" onclick="loadPhoto()">Next Photo</button>
      <span id="photo-error"></span>
    </div>
  </div>
</div>

<script>
  let pendingSessionId = null;
  let pollTimer = null;

  async function init() {
    const res = await fetch('/api/me');
    const data = await res.json();
    if (!data.loggedIn) return;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-name').textContent = data.name;
    if (data.photo) document.getElementById('user-avatar').src = data.photo;
    showHome();
  }

  async function showHome() {
    clearInterval(pollTimer);
    pendingSessionId = null;
    setView('home-screen');
    const res = await fetch('/api/people');
    const { people } = await res.json();
    renderPeople(people || []);
  }

  function renderPeople(people) {
    const grid = document.getElementById('people-grid');
    const empty = document.getElementById('empty-state');
    if (people.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'flex';
      return;
    }
    empty.style.display = 'none';
    grid.innerHTML = people.map((p, i) => `
      <div class="person-card" onclick="openPerson(${i}, '${esc(p.name)}', '${esc(p.sessionId)}')">
        ${p.previewUrl
          ? `<img src="${esc(p.previewUrl)}" alt="${esc(p.name)}" onerror="this.style.display='none'" />`
          : `<div class="card-placeholder"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>`}
        <div class="card-label">${esc(p.name)}</div>
        <button class="delete-btn" onclick="deletePerson(event,${i})">✕</button>
      </div>`).join('');
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  async function deletePerson(e, i) {
    e.stopPropagation();
    if (!confirm('Remove this person?')) return;
    await fetch(`/api/people/${i}`, { method: 'DELETE' });
    showHome();
  }

  function showAddScreen() {
    setView('add-screen');
    document.getElementById('add-step-1').style.display = 'flex';
    document.getElementById('add-step-2').style.display = 'none';
    document.getElementById('open-picker-btn').disabled = false;
    document.getElementById('add-step-1').querySelector('p').textContent =
      'Open Google Photos, go to People & Pets, and select all photos of one person. Then come back here.';
  }

  async function openPicker() {
    document.getElementById('open-picker-btn').disabled = true;
    const res = await fetch('/api/picker/create', { method: 'POST' });
    const data = await res.json();
    if (data.error) { alert('Error: ' + JSON.stringify(data.error)); return; }

    pendingSessionId = data.sessionId;
    window.open(data.pickerUri, '_blank', 'width=900,height=700');
    document.getElementById('add-step-1').querySelector('p').textContent =
      'Waiting for you to finish selecting photos in the popup...';

    pollTimer = setInterval(async () => {
      const r = await fetch(`/api/picker/status?sessionId=${pendingSessionId}`);
      const d = await r.json();
      if (d.ready) {
        clearInterval(pollTimer);
        document.getElementById('add-step-1').style.display = 'none';
        document.getElementById('add-step-2').style.display = 'flex';
        document.getElementById('person-name-input').focus();
      }
    }, 3000);
  }

  async function savePerson() {
    const name = document.getElementById('person-name-input').value.trim();
    if (!name) { document.getElementById('person-name-input').focus(); return; }

    let previewUrl = null;
    try {
      const r = await fetch(`/api/random-photo?sessionId=${pendingSessionId}`);
      const d = await r.json();
      if (d.url) previewUrl = d.url;
    } catch {}

    await fetch('/api/people', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, sessionId: pendingSessionId, previewUrl }),
    });

    document.getElementById('person-name-input').value = '';
    pendingSessionId = null;
    showHome();
  }

  function openPerson(index, name, sessionId) {
    setView('photo-screen');
    document.getElementById('photo-person-name').textContent = name;
    document.getElementById('photo-screen').dataset.sessionId = sessionId;
    loadPhoto();
  }

  async function loadPhoto() {
    const sessionId = document.getElementById('photo-screen').dataset.sessionId;
    const photoEl = document.getElementById('photo');
    const spinner = document.getElementById('spinner');
    const errorEl = document.getElementById('photo-error');
    const nextBtn = document.getElementById('next-btn');

    nextBtn.disabled = true;
    errorEl.style.display = 'none';
    photoEl.classList.add('hidden');
    spinner.style.display = 'block';

    try {
      const res = await fetch(`/api/random-photo?sessionId=${sessionId}`);
      const data = await res.json();
      if (data.error) {
        spinner.style.display = 'none';
        errorEl.textContent = data.error;
        errorEl.style.display = 'block';
        nextBtn.disabled = false;
        return;
      }
      photoEl.src = data.url;
      photoEl.onload = () => {
        spinner.style.display = 'none';
        photoEl.classList.remove('hidden');
        document.getElementById('photo-filename').textContent = data.filename || '';
        nextBtn.disabled = false;
      };
      photoEl.onerror = () => {
        spinner.style.display = 'none';
        errorEl.textContent = 'Could not load photo, try again.';
        errorEl.style.display = 'block';
        nextBtn.disabled = false;
      };
    } catch {
      spinner.style.display = 'none';
      errorEl.textContent = 'Network error.';
      errorEl.style.display = 'block';
      nextBtn.disabled = false;
    }
  }

  function setView(id) {
    ['home-screen','add-screen','photo-screen'].forEach(v => {
      document.getElementById(v).style.display = v === id ? 'block' : 'none';
    });
    if (id === 'photo-screen') document.getElementById('photo-screen').style.display = 'flex';
    if (id === 'add-screen') document.getElementById('add-screen').style.display = 'flex';
  }

  init();
</script>
</body>
</html>
