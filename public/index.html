<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1108" />
  <title>Picster</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/full.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1108;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 16px);
      gap: 24px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    /* ── Empty ── */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
      padding: 32px;
    }
    #empty h1 { font-size: 2rem; font-weight: 700; letter-spacing: -1px; }
    #empty p { color: #888; font-size: 0.9rem; line-height: 1.6; max-width: 250px; }

    /* ── Score bar ── */
    #score-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 340px;
    }
    #score-text { font-size: 0.9rem; color: rgba(255,255,255,0.45); }

    /* ── Polaroid ── */
    #tilt-wrapper { display: none; }

    #polaroid {
      background: #fafaf8;
      padding: 10px 10px 0;
      box-shadow:
        0 4px 6px rgba(0,0,0,0.3),
        0 12px 40px rgba(0,0,0,0.5),
        inset 0 0 0 1px rgba(0,0,0,0.06);
      border-radius: 2px;
      width: min(84vw, 320px);
    }

    /* ── Photo ── */
    #photo-area {
      width: 100%;
      aspect-ratio: 1;
      background: #d8d4cc;
      position: relative;
      overflow: hidden;
    }

    #photo {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.25s;
    }
    #photo.loading { opacity: 0; }

    #photo-spinner {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #d8d4cc;
    }
    .spin {
      width: 30px; height: 30px;
      border: 3px solid rgba(0,0,0,0.12);
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Polaroid white space ── */
    #white-space {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #year-input {
      font-family: 'Caveat', cursive;
      font-size: 2.2rem;
      font-weight: 500;
      color: #1a1108;
      border: none;
      outline: none;
      background: transparent;
      text-align: center;
      width: 100%;
      padding: 0 12px;
      -moz-appearance: textfield;
    }
    #year-input::-webkit-outer-spin-button,
    #year-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    #year-input::placeholder { color: #c8c4bc; }

    #result {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 0;
    }
    #result-line1 {
      font-family: 'Caveat', cursive;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.1;
    }
    #result-line2 {
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
      font-weight: 500;
      opacity: 0.8;
    }
    .correct { color: #1e7a3e; }
    .wrong   { color: #c01515; }

    /* ── Action button ── */
    #action-btn {
      display: none;
      background: #fff;
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      padding: 15px 44px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: transform 0.1s;
      min-width: 180px;
      text-align: center;
    }
    #action-btn:active { transform: scale(0.96); }
    #action-btn:disabled { opacity: 0.3; }

    .add-btn {
      background: #fff;
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 36px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
    }

    .small-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.55);
      font-size: 0.8rem;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
    }

    /* ── Animations ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15%  { transform: translateX(-10px); }
      30%  { transform: translateX(10px); }
      45%  { transform: translateX(-8px); }
      60%  { transform: translateX(8px); }
      75%  { transform: translateX(-4px); }
      90%  { transform: translateX(4px); }
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes flash-red {
      0%,100% { background: #fafaf8; }
      30%     { background: #ffe0e0; }
    }

    .anim-shake { animation: shake 0.45s ease; }
    .anim-pop   { animation: pop 0.35s ease; }
    .anim-flash { animation: flash-red 0.5s ease; }
  </style>
</head>
<body>

<!-- Empty state -->
<div id="empty">
  <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.2">
    <rect x="2" y="4" width="20" height="16" rx="3"/>
    <circle cx="8.5" cy="10.5" r="1.5"/>
    <path d="m21 15-5-5L5 20"/>
  </svg>
  <h1>Picster</h1>
  <p>Add photos from your iPhone and guess what year they were taken.</p>
  <button class="add-btn" onclick="pickPhotos()">Add Photos</button>
</div>

<!-- Score bar -->
<div id="score-bar">
  <span id="score-text">0 correct</span>
  <button class="small-btn" onclick="pickPhotos()">+ Photos</button>
</div>

<!-- Polaroid -->
<div id="tilt-wrapper">
  <div id="polaroid">
    <div id="photo-area">
      <img id="photo" class="loading" alt="" />
      <div id="photo-spinner"><div class="spin"></div></div>
    </div>
    <div id="white-space">
      <input id="year-input" type="number" inputmode="numeric" pattern="[0-9]*"
             min="1900" max="2030" placeholder="What year?" autocomplete="off" />
      <div id="result">
        <div id="result-line1"></div>
        <div id="result-line2"></div>
      </div>
    </div>
  </div>
</div>

<!-- Action button -->
<button id="action-btn" onclick="handleAction()">Submit</button>

<input id="file-input" type="file" accept="image/*" multiple style="display:none" />

<script>
  // ── IndexedDB ──
  let _db;
  async function openDB() {
    if (_db) return _db;
    return new Promise((res, rej) => {
      const req = indexedDB.open('picster', 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
      req.onsuccess = e => { _db = e.target.result; res(_db); };
      req.onerror = e => rej(e.target.error);
    });
  }
  async function getAllIds() {
    const db = await openDB();
    return new Promise((res, rej) => {
      const req = db.transaction('photos','readonly').objectStore('photos').getAllKeys();
      req.onsuccess = () => res(req.result);
      req.onerror = e => rej(e.target.error);
    });
  }
  async function getPhoto(id) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const req = db.transaction('photos','readonly').objectStore('photos').get(id);
      req.onsuccess = () => res(req.result);
      req.onerror = e => rej(e.target.error);
    });
  }
  async function savePhotos(files) {
    const db = await openDB();
    const tx = db.transaction('photos','readwrite');
    const store = tx.objectStore('photos');
    for (const file of files) {
      const year = await extractYear(file);
      store.add({ blob: file, name: file.name, added: Date.now(), year });
    }
    return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = e => rej(e.target.error); });
  }
  async function extractYear(blob) {
    try {
      const exif = await exifr.parse(blob, {
        pick: ['DateTimeOriginal', 'CreateDate', 'DateTimeDigitized', 'DateTime'],
        translateValues: false,
      });
      const d = exif?.DateTimeOriginal || exif?.CreateDate || exif?.DateTimeDigitized || exif?.DateTime;
      if (d) return new Date(d).getFullYear();
    } catch {}
    if (blob instanceof File) return new Date(blob.lastModified).getFullYear();
    return null;
  }

  // ── Game state ──
  let allIds = [], currentYear = null, currentObjectUrl = null;
  let gameState = 'idle';
  let correct = 0, total = 0;

  const tilts = [-3, -2, -1, 0.5, 1.5, 2.5];

  const $ = id => document.getElementById(id);
  const photoEl      = $('photo');
  const photoSpinner = $('photo-spinner');
  const yearInput    = $('year-input');
  const resultEl     = $('result');
  const line1        = $('result-line1');
  const line2        = $('result-line2');
  const actionBtn    = $('action-btn');
  const scoreText    = $('score-text');
  const polaroid     = $('polaroid');
  const tiltWrapper  = $('tilt-wrapper');

  function animate(el, cls) {
    el.classList.remove(cls);
    void el.offsetWidth;
    el.classList.add(cls);
    el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
  }

  async function init() {
    allIds = await getAllIds();
    if (allIds.length === 0) {
      $('empty').style.display = 'flex';
      $('score-bar').style.display = 'none';
      tiltWrapper.style.display = 'none';
      actionBtn.style.display = 'none';
    } else {
      $('empty').style.display = 'none';
      $('score-bar').style.display = 'flex';
      tiltWrapper.style.display = 'block';
      actionBtn.style.display = 'block';
      loadNext();
    }
  }

  async function loadNext() {
    gameState = 'loading';
    actionBtn.disabled = true;
    actionBtn.textContent = 'Submit';

    yearInput.value = '';
    yearInput.style.display = 'block';
    resultEl.style.display = 'none';
    photoEl.classList.add('loading');
    photoSpinner.style.display = 'flex';

    const tilt = tilts[Math.floor(Math.random() * tilts.length)];
    tiltWrapper.style.transform = `rotate(${tilt}deg)`;

    allIds = await getAllIds();
    if (!allIds.length) { init(); return; }

    const id = allIds[Math.floor(Math.random() * allIds.length)];
    const record = await getPhoto(id);
    if (!record) { loadNext(); return; }

    currentYear = await extractYear(record.blob) || record.year;
    if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
    currentObjectUrl = URL.createObjectURL(record.blob);

    photoEl.src = currentObjectUrl;
    photoEl.onload = () => {
      photoSpinner.style.display = 'none';
      photoEl.classList.remove('loading');
      gameState = 'guessing';
      actionBtn.disabled = false;
      setTimeout(() => yearInput.focus(), 50);
    };
  }

  function handleAction() {
    if (gameState === 'guessing') submitGuess();
    else if (gameState === 'answered') loadNext();
  }

  function submitGuess() {
    const guess = parseInt(yearInput.value);
    if (!guess || String(guess).length < 4) { yearInput.focus(); return; }

    total++;
    yearInput.style.display = 'none';
    resultEl.style.display = 'flex';
    gameState = 'answered';
    actionBtn.textContent = 'Next →';
    actionBtn.disabled = false;

    if (guess === currentYear) {
      correct++;
      line1.textContent = '✓ Correct!';
      line1.className = 'correct';
      line2.textContent = currentYear;
      line2.className = 'correct';
      animate(polaroid, 'anim-pop');
    } else {
      line1.textContent = `✗ ${guess}`;
      line1.className = 'wrong';
      line2.textContent = `It was ${currentYear}`;
      line2.className = 'wrong';
      animate(polaroid, 'anim-shake');
      animate(polaroid, 'anim-flash');
    }

    scoreText.textContent = `${correct} / ${total} correct`;
  }

  yearInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleAction(); });

  function pickPhotos() { $('file-input').click(); }

  $('file-input').addEventListener('change', async e => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    await savePhotos(files);
    e.target.value = '';
    init();
  });

  init();
</script>
</body>
</html>
