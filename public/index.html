<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>Picster</title>
  <script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/lite.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    /* ── Empty state ── */
    #empty {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px 32px calc(40px + env(safe-area-inset-bottom));
      text-align: center;
    }

    #empty svg { opacity: 0.25; }

    #empty h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    #empty p {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.5;
      max-width: 260px;
    }

    .add-btn {
      background: #fff;
      color: #000;
      font-size: 1rem;
      font-weight: 700;
      padding: 15px 36px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      margin-top: 8px;
    }

    /* ── Photo view ── */
    #viewer {
      display: none;
      height: 100dvh;
      position: relative;
      overflow: hidden;
    }

    #photo-bg {
      position: absolute;
      inset: -20px;
      background-size: cover;
      background-position: center;
      filter: blur(24px) brightness(0.35) saturate(1.5);
      transform: scale(1.05);
    }

    #photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    #photo.loading { opacity: 0; }

    /* ── Top bar ── */
    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: calc(env(safe-area-inset-top) + 16px) 20px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    #top-bar .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; }

    #count {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.4);
      padding: 4px 10px;
      border-radius: 20px;
      backdrop-filter: blur(8px);
    }

    /* ── Bottom bar ── */
    #bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 28px calc(env(safe-area-inset-bottom) + 20px);
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    .icon-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: background 0.15s;
    }

    .icon-btn:active { background: rgba(255,255,255,0.28); }

    .icon-btn.danger:active { background: rgba(255,60,60,0.4); }

    #next-btn {
      background: rgba(255,255,255,0.9);
      color: #000;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
    }

    #next-btn:active { transform: scale(0.94); }

    /* ── Year ── */
    #year-display {
      position: absolute;
      top: calc(env(safe-area-inset-top) + 72px);
      left: 0;
      right: 0;
      text-align: center;
      font-size: 5.5rem;
      font-weight: 900;
      letter-spacing: -3px;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 2px 24px rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 8;
      transition: opacity 0.2s;
    }

    /* ── Spinner ── */
    #spinner {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .spin {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Hidden file input ── */
    #file-input { display: none; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 100px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(16px);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.875rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- Empty state -->
<div id="empty">
  <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1">
    <rect x="2" y="4" width="20" height="16" rx="3"/>
    <circle cx="8.5" cy="10.5" r="1.5"/>
    <path d="m21 15-5-5L5 20"/>
  </svg>
  <h1>Picster</h1>
  <p>Add photos from your iPhone and see them randomly, one by one.</p>
  <button class="add-btn" onclick="pickPhotos()">Add Photos</button>
</div>

<!-- Photo viewer -->
<div id="viewer">
  <div id="photo-bg"></div>

  <div id="top-bar">
    <span class="logo">Picster</span>
    <span id="count"></span>
  </div>

  <div id="year-display"></div>
  <img id="photo" alt="" onclick="nextPhoto()" />

  <div id="spinner"><div class="spin"></div></div>

  <div id="bottom-bar">
    <button class="icon-btn danger" onclick="deleteCurrentPhoto()" title="Delete">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
    </button>

    <button id="next-btn" onclick="nextPhoto()" title="Next">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M5 12h14M13 6l6 6-6 6"/>
      </svg>
    </button>

    <button class="icon-btn" onclick="pickPhotos()" title="Add photos">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>
</div>

<div id="toast"></div>
<input id="file-input" type="file" accept="image/*" multiple />

<script>
  // ── IndexedDB ──
  let db;

  async function openDB() {
    if (db) return db;
    return new Promise((res, rej) => {
      const req = indexedDB.open('picster', 1);
      req.onupgradeneeded = e => {
        e.target.result.createObjectStore('photos', { keyPath: 'id', autoIncrement: true });
      };
      req.onsuccess = e => { db = e.target.result; res(db); };
      req.onerror = e => rej(e.target.error);
    });
  }

  async function getYear(file) {
    try {
      const exif = await exifr.parse(file, ['DateTimeOriginal', 'CreateDate']);
      const date = exif?.DateTimeOriginal || exif?.CreateDate;
      if (date) return new Date(date).getFullYear();
    } catch {}
    return new Date(file.lastModified).getFullYear();
  }

  async function savePhotos(files) {
    const db = await openDB();
    const tx = db.transaction('photos', 'readwrite');
    const store = tx.objectStore('photos');
    for (const file of files) {
      const year = await getYear(file);
      store.add({ blob: file, name: file.name, added: Date.now(), year });
    }
    return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = e => rej(e.target.error); });
  }

  async function countPhotos() {
    const db = await openDB();
    return new Promise((res, rej) => {
      const req = db.transaction('photos', 'readonly').objectStore('photos').count();
      req.onsuccess = () => res(req.result);
      req.onerror = e => rej(e.target.error);
    });
  }

  async function getAllIds() {
    const db = await openDB();
    return new Promise((res, rej) => {
      const req = db.transaction('photos', 'readonly').objectStore('photos').getAllKeys();
      req.onsuccess = () => res(req.result);
      req.onerror = e => rej(e.target.error);
    });
  }

  async function getPhoto(id) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const req = db.transaction('photos', 'readonly').objectStore('photos').get(id);
      req.onsuccess = () => res(req.result);
      req.onerror = e => rej(e.target.error);
    });
  }

  async function deletePhoto(id) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('photos', 'readwrite');
      tx.objectStore('photos').delete(id);
      tx.oncomplete = res;
      tx.onerror = e => rej(e.target.error);
    });
  }

  // ── State ──
  let allIds = [];
  let currentId = null;
  let currentObjectUrl = null;

  // ── UI ──
  async function init() {
    allIds = await getAllIds();
    if (allIds.length === 0) {
      showEmpty();
    } else {
      showViewer();
      await loadRandomPhoto();
    }
  }

  function showEmpty() {
    document.getElementById('empty').style.display = 'flex';
    document.getElementById('viewer').style.display = 'none';
  }

  function showViewer() {
    document.getElementById('empty').style.display = 'none';
    document.getElementById('viewer').style.display = 'block';
  }

  async function loadRandomPhoto() {
    if (allIds.length === 0) { showEmpty(); return; }

    const photoEl = document.getElementById('photo');
    const spinner = document.getElementById('spinner');

    photoEl.classList.add('loading');
    spinner.style.display = 'flex';

    const randomId = allIds[Math.floor(Math.random() * allIds.length)];
    currentId = randomId;

    const record = await getPhoto(randomId);
    if (!record) { await refreshIds(); await loadRandomPhoto(); return; }

    if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
    currentObjectUrl = URL.createObjectURL(record.blob);

    document.getElementById('photo-bg').style.backgroundImage = `url(${currentObjectUrl})`;
    document.getElementById('year-display').textContent = record.year || '';
    photoEl.src = currentObjectUrl;
    photoEl.onload = () => {
      spinner.style.display = 'none';
      photoEl.classList.remove('loading');
    };

    document.getElementById('count').textContent = `${allIds.length} photo${allIds.length !== 1 ? 's' : ''}`;
  }

  async function nextPhoto() {
    await loadRandomPhoto();
  }

  async function deleteCurrentPhoto() {
    if (!currentId) return;
    await deletePhoto(currentId);
    allIds = allIds.filter(id => id !== currentId);
    currentId = null;
    showToast('Photo deleted');
    if (allIds.length === 0) { showEmpty(); return; }
    await loadRandomPhoto();
  }

  async function refreshIds() {
    allIds = await getAllIds();
  }

  // ── File picker ──
  function pickPhotos() {
    document.getElementById('file-input').click();
  }

  document.getElementById('file-input').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    await savePhotos(files);
    e.target.value = '';
    allIds = await getAllIds();
    showToast(`${files.length} photo${files.length !== 1 ? 's' : ''} added`);
    showViewer();
    await loadRandomPhoto();
  });

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  init();
</script>
</body>
</html>
