<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Picster</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Login screen ── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    #login-screen h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
      color: #fff;
    }

    #login-screen p {
      color: #888;
      font-size: 1rem;
    }

    .google-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      color: #3c4043;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }

    .google-btn:hover {
      box-shadow: 0 4px 16px rgba(255,255,255,0.15);
    }

    .google-btn svg { width: 20px; height: 20px; }

    /* ── Photo screen ── */
    #photo-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100vh;
      position: relative;
    }

    #topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      z-index: 10;
    }

    #topbar .logo { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; }

    #user-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #user-row img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }

    #user-row span { font-size: 0.875rem; color: #ccc; }

    #logout-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      color: #ccc;
      font-size: 0.8rem;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    #logout-btn:hover { border-color: #fff; color: #fff; }

    #photo-wrap {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    #photo {
      max-width: 100%;
      max-height: 100vh;
      object-fit: contain;
      transition: opacity 0.35s ease;
    }

    #photo.hidden { opacity: 0; }

    #spinner {
      position: absolute;
      display: none;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 24px;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    }

    #filename {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.03em;
    }

    #next-btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px 36px;
      border-radius: 50px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.1s;
    }

    #next-btn:hover { background: rgba(255,255,255,0.22); }
    #next-btn:active { transform: scale(0.97); }
    #next-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #error-msg {
      color: #ff6b6b;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <h1>Picster</h1>
    <p>A random photo from your Google Photos library</p>
    <a class="google-btn" href="/auth/google">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </a>
  </div>

  <!-- Photo viewer -->
  <div id="photo-screen">
    <div id="topbar">
      <span class="logo">Picster</span>
      <div id="user-row">
        <img id="user-avatar" src="" alt="" />
        <span id="user-name"></span>
        <button id="logout-btn" onclick="location.href='/auth/logout'">Logout</button>
      </div>
    </div>

    <div id="photo-wrap">
      <div id="spinner"></div>
      <img id="photo" class="hidden" alt="Random photo" />
    </div>

    <div id="bottom-bar">
      <span id="filename"></span>
      <button id="next-btn" onclick="loadPhoto()">Next Photo</button>
      <span id="error-msg"></span>
    </div>
  </div>

  <script>
    const loginScreen = document.getElementById('login-screen');
    const photoScreen = document.getElementById('photo-screen');
    const photoEl = document.getElementById('photo');
    const spinner = document.getElementById('spinner');
    const filenameEl = document.getElementById('filename');
    const nextBtn = document.getElementById('next-btn');
    const errorMsg = document.getElementById('error-msg');

    let pollInterval = null;

    async function init() {
      const res = await fetch('/api/me');
      const data = await res.json();
      if (!data.loggedIn) return;

      loginScreen.style.display = 'none';
      photoScreen.style.display = 'flex';
      document.getElementById('user-name').textContent = data.name;
      if (data.photo) document.getElementById('user-avatar').src = data.photo;

      if (data.hasSession) {
        loadPhoto();
      } else {
        showPickerPrompt();
      }
    }

    function showPickerPrompt() {
      spinner.style.display = 'none';
      nextBtn.textContent = 'Choose your photos';
      nextBtn.disabled = false;
      nextBtn.onclick = openPicker;
      filenameEl.textContent = 'Select which photos to use';
    }

    async function openPicker() {
      nextBtn.disabled = true;
      filenameEl.textContent = 'Opening Google Photos...';
      const res = await fetch('/api/picker/create', { method: 'POST' });
      const data = await res.json();
      if (data.error) { showError(JSON.stringify(data.error)); return; }

      window.open(data.pickerUri, '_blank', 'width=900,height=700');
      filenameEl.textContent = 'Pick your photos in the popup, then come back here.';
      pollInterval = setInterval(checkPickerDone, 3000);
    }

    async function checkPickerDone() {
      const res = await fetch('/api/picker/status');
      const data = await res.json();
      if (data.ready) {
        clearInterval(pollInterval);
        nextBtn.textContent = 'Next Photo';
        nextBtn.onclick = loadPhoto;
        loadPhoto();
      }
    }

    async function loadPhoto() {
      nextBtn.disabled = true;
      errorMsg.style.display = 'none';
      photoEl.classList.add('hidden');
      spinner.style.display = 'block';

      try {
        const res = await fetch('/api/random-photo');
        if (res.status === 401) { location.href = '/'; return; }
        const data = await res.json();
        if (data.error) {
          const detail = data.detail?.error?.message || data.detail || '';
          showError(`${data.error}${detail ? ': ' + detail : ''}`);
          return;
        }
        photoEl.src = data.url;
        photoEl.onload = () => {
          spinner.style.display = 'none';
          photoEl.classList.remove('hidden');
          filenameEl.textContent = data.filename || '';
          nextBtn.disabled = false;
        };
        photoEl.onerror = () => showError('Could not load this photo, try again.');
      } catch {
        showError('Network error, please try again.');
      }
    }

    function showError(msg) {
      spinner.style.display = 'none';
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      nextBtn.disabled = false;
    }

    init();
  </script>
</body>
</html>
